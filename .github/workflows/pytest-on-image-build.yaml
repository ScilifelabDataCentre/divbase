name: Run pytest when new images built and published to GHCR
on:
  workflow_run:
    workflows: ["Build and Push images to GitHub Container Registry"]
    types:
      - completed
  workflow_dispatch: # TODO - temp for debugging, so don't need to rebuild images.
    inputs:
      image_tag:
        description: 'Docker image tag to test against (e.g. a commit SHA or release tag)'
        required: true
  pull_request: # TODO - temp for debugging, so don't need to rebuild images.
    branches:
      - main

jobs:
  run-pytest-on-newly-built-images:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.15"
          enable-cache: true

      - name: Install the project
        run: | 
          uv sync --locked --dev
          uv run playwright install chromium

      - name: Pull new images built in the previous workflow run
        env:
          TAG: ${{ github.event.workflow_run.head_sha }}
        run: |
          docker pull ghcr.io/scilifelabdatacentre/divbase-fastapi:latest # TODO, temp
          docker pull ghcr.io/scilifelabdatacentre/divbase-worker:latest # TODO, temp

      - name: Run pytest including slow tests
        env: 
          GITHUB_ACTIONS_RUNNER: "true"
          DIVBASE_FASTAPI_IMAGE: ghcr.io/scilifelabdatacentre/divbase-fastapi:latest # TODO, temp
          DIVBASE_WORKER_IMAGE: ghcr.io/scilifelabdatacentre/divbase-worker:latest # TODO, temp
        run: uv run pytest -s tests/e2e_integration/cli_commands/test_file_cli.py # TODO, run subset of tests I know are failing