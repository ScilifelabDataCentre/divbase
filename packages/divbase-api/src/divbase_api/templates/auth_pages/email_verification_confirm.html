{% extends "base.html" %}

{% block title %}Verify Email Address - DivBase{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mb-4">
        <div class="col-sm-10 col-md-8 col-lg-6 col-xl-5">

            <div class="text-center mt-4 mb-3">
                <i class="bi bi-envelope-check scilife-verify-email-icon"></i>
                <h1 class="scilife-subsection mt-2">Confirm your email address</h1>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 text-center">
                    <p class="text-muted mb-4">
                        Click the button below to confirm your email address <em>{{ email }}</em> and complete the verification process.
                    </p>
                    <form method="post" action="/confirm-email-verification">
                        <input type="hidden" name="token" value="{{ token }}">
                        <button type="submit" class="btn scilife-confirm-button px-5">Confirm my email address</button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
