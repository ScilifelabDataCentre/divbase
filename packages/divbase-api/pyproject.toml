[project]
name = "divbase-api"
dynamic = ["version"]
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]==0.138.0",
    "uvicorn==0.49.0",
    "asyncpg==0.31.0", 
    "pyjwt==2.13.0",
    "pwdlib[argon2]==0.3.0",
    "starlette-admin==0.16.1",
    "emails==1.1.2",
    "jinja2==3.1.6",
    "celery==5.6.3",
    "alembic==1.18.4",
    "psycopg2-binary==2.9.12",
    "sqlalchemy[asyncio]==2.0.51", # Note that a minor bump is considered a major change for sqlalchemy
    "prometheus-client==0.25.0",
    "psutil==7.2.2",
    "boto3==1.43.34",
    "structlog>=26.1.0",    
    "divbase-lib", # always uses version in repo, handled by uv
]

[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/divbase_api/__init__.py"

[tool.uv.sources]
divbase-lib = { workspace = true }

[project.scripts]
divbase-api = "divbase_api.divbase_api:main"

[tool.ruff]
extend = "../../ruff.toml"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"divbase_cli" = { msg = "divbase-api cannot use code from divbase-cli. Move shared code to divbase-lib." }
