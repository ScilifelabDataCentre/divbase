[project]
name = "divbase-api"
dynamic = ["version"]
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]==0.133.0",
    "uvicorn==0.41.0",
    "asyncpg==0.31.0", 
    "pyjwt==2.11.0",
    "pwdlib[argon2]==0.3.0",
    "starlette-admin==0.16.0",
    "emails==0.6",
    "jinja2==3.1.6",
    "celery==5.6.2",
    "alembic==1.18.4",
    "psycopg2-binary==2.9.11",
    "sqlalchemy[asyncio]==2.0.47", # Note that a minor bump is considered a major change for sqlalchemy
    "prometheus-client==0.24.1",
    "psutil==7.2.2",
    "boto3==1.42.56",
    "divbase-lib", # always uses version in repo, handled by uv
]

[build-system]
requires = ["hatchling >= 1.26"]
build-backend = "hatchling.build"

[tool.hatch.version]
path = "src/divbase_api/__init__.py"

[tool.uv.sources]
divbase-lib = { workspace = true }

[project.scripts]
divbase-api = "divbase_api.divbase_api:main"

[tool.ruff]
extend = "../../ruff.toml"

[tool.ruff.lint.flake8-tidy-imports.banned-api]
"divbase_cli" = { msg = "divbase-api cannot use code from divbase-cli. Move shared code to divbase-lib." }
