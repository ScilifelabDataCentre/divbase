# Compose overlay that orchestrates FastAPI and Celery worker containers with coverage.py monitoring.
# Intended to be applied as a third layer on top of divbase_compose.yaml + divbase_compose.tests.yaml.
#
# Running coverage.py on distributed systems is tricky, but possible. This solution uses exec python -c 
# commands in the docker entrypoints to handle the finicky details of running coverage for the fastAPI 
# and Celery worker containers for DivBase. The challenge was to figure out how to make the containers
# stop coverage correctly so that the results are saved to the host mount volume before the container exits.
# Hence the somewhat complex entrypoint commands that set up signal handlers and atexit handlers to ensure 
# that coverage.py saves on shutdown.
#
# SHUTDOWN SIGNALS:
# To flush the results to file, coverage.py needs to receive a SIGTERM signal and run its shutdown handlers. 
# However, Docker sends SIGTERM to PID 1 in the container, which is usually a shell that doesn't forward signals. 
# By using exec python, we make Python the PID 1 process, allowing it to receive SIGTERM directly. 
#
# Both uvicorn and Celery install their own SIGTERM handlers, so when Docker stops the containers, the signal is received, 
# graceful shutdown runs, and coverage.py flushes the data before exit.
# The test suite scripts and conftest files ensures that the testing stack is stopped with SIGTERM first (docker compose stop)
# before teardown continues with docker compose down (SIGKILL). SIGTERM is needed for coverage to flush is results.
#
# source_pkgs overrides pyproject.toml's source_pkgs (which includes divbase_cli).
# divbase_cli is not installed in the api/worker containers so it is excluded here.
#
# After tests, combine data from all sources:
#   cp .coverage docker/coverage-data/.coverage.host
#   coverage combine docker/coverage-data/
#   coverage html

services:
  fastapi:
    environment:
      - COVERAGE_FILE=/coverage-data/.coverage
    volumes:
      - ./coverage-data:/coverage-data
    # Reset entrypoint/command from the base image to inject coverage instrumentation.
    # uv-created venvs exclude pip, so bootstrap it via ensurepip (Python standard library)
    # before installing coverage[toml]. The [toml] extra lets coverage read pyproject.toml.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python -m ensurepip && python -m pip install --quiet 'coverage[toml]' && exec python -c "
        import atexit, coverage, signal, sys, uvicorn
        cov = coverage.Coverage(data_suffix=True, branch=True, source_pkgs=['divbase_api', 'divbase_lib'])
        cov.start()
        atexit.register(cov.save)
        atexit.register(cov.stop)
        signal.signal(signal.SIGTERM, lambda s, f: sys.exit(0))
        uvicorn.run('divbase_api.divbase_api:app', host='0.0.0.0', log_level='info')
        "

  worker-quick:
    environment:
      - COVERAGE_FILE=/coverage-data/.coverage
    volumes:
      - ./coverage-data:/coverage-data
    entrypoint: ["/bin/sh", "-c"]
    # --pool=solo keeps tasks in the main process rather than forking workers. coverage.py
    # traces the process it starts in; forked children inherit no tracer, so task bodies
    # would be invisible to coverage with the default prefork pool.
    # Celery Beat (-B) runs scheduled tasks in a background thread, unaffected by pool type.
    command:
      - |
        python -m ensurepip && python -m pip install --quiet 'coverage[toml]' && exec python -c "
        import atexit, coverage, signal, sys; from celery.__main__ import main
        cov = coverage.Coverage(data_suffix=True, branch=True, source_pkgs=['divbase_api', 'divbase_lib'])
        cov.start()
        atexit.register(cov.save)
        atexit.register(cov.stop)
        signal.signal(signal.SIGTERM, lambda s, f: sys.exit(0))
        sys.argv = ['celery', '-A', 'divbase_api.worker.tasks', 'worker',
                    '--loglevel=info', '-Q', 'quick,celery',
                    '--hostname=worker-quick@%h', '--concurrency=1', '-B', '--pool=solo']
        main()
        "

  worker-long:
    environment:
      - COVERAGE_FILE=/coverage-data/.coverage
    volumes:
      - ./coverage-data:/coverage-data
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        python -m ensurepip && python -m pip install --quiet 'coverage[toml]' && exec python -c "
        import atexit, coverage, signal, sys; from celery.__main__ import main
        cov = coverage.Coverage(data_suffix=True, branch=True, source_pkgs=['divbase_api', 'divbase_lib'])
        cov.start()
        atexit.register(cov.save)
        atexit.register(cov.stop)
        signal.signal(signal.SIGTERM, lambda s, f: sys.exit(0))
        sys.argv = ['celery', '-A', 'divbase_api.worker.tasks', 'worker',
                    '--loglevel=info', '-Q', 'long',
                    '--hostname=worker-long@%h', '--concurrency=1', '--pool=solo']
        main()
        "
