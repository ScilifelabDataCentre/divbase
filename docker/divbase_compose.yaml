name: divbase
networks:
  # Simulate S3 living outside remainder of services
  internal:
    driver: bridge
  external-s3:
    driver: bridge
  # External network for monitoring services defined in monitoring_compose.yaml
  divbase-observability:
    name: divbase-observability
    driver: bridge
services:
  rabbitmq:
    image: "rabbitmq:4.3.0-management-alpine@sha256:1a43764bdcf116542e7c8c794adc67c79461727da16d474e9e21483fe7f716d3"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - 5672:5672
      - 15692:15692 # Prometheus metrics endpoint
    environment:
      - RABBITMQ_DEFAULT_USER=celery_user
      - RABBITMQ_DEFAULT_PASS=badpassword
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbitmq_prometheus true
      - RABBITMQ_PROMETHEUS_RETURN_PER_OBJECT_METRICS=true # enable per-queue metrics
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq #to avoid anonymous volumes being created
    networks: &internal-network
      - internal 
      - divbase-observability
  worker-quick:
    hostname: worker-quick
    build: &worker-build
      context: .. 
      dockerfile: docker/worker.dockerfile
    healthcheck: &worker-healthcheck
      test:
        # we pipe to grep to validate we got a pong back
        [
          "CMD-SHELL",
          "celery -A divbase_api.worker.tasks inspect ping -d \"$$HOSTNAME@$$HOSTNAME\" | grep -q pong",
        ]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on: &worker-api-depends
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    environment: &worker-env
      - DIVBASE_ENV=local_dev
      - CELERY_BROKER_URL=pyamqp://celery_user:badpassword@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=db+postgresql://divbase_user:badpassword@postgres:5432/divbase_db
      - SYNC_DATABASE_URL=postgresql+psycopg2://divbase_user:badpassword@postgres:5432/divbase_db
      - S3_ENDPOINT_URL=http://host.docker.internal:9000
      - S3_PRESIGNING_URL=http://localhost:9000
      - S3_BUCKET_PREFIX=divbase-local-
      - S3_SERVICE_ACCOUNT_ACCESS_KEY=s3-service-account
      - S3_SERVICE_ACCOUNT_SECRET_KEY=badpassword
      - ENABLE_WORKER_METRICS=0 # Disable metrics collection and metrics server in the worker as it comes with some overhead.
      - ENABLE_WORKER_METRICS_PER_TASK=0 # Disable per-task metrics collection in the worker as it comes with some overhead.
    develop: &watch-celery-src
      watch:
        - action: sync+restart
          path: ../packages/divbase-api/src/divbase_api/
          target: /app/.venv/lib/python3.13/site-packages/divbase_api/
        - action: sync+restart
          path: ../packages/divbase-lib/src/divbase_lib/
          target: /app/.venv/lib/python3.13/site-packages/divbase_lib/
        - action: rebuild
          path: ../uv.lock
    # NOTE: celery beat runs here ("-B"), in production it is run as a separate service
    # NOTE: Worker quick takes any non-specified tasks (with -Q "celery" being the default queue), 
    command: ["-Q", "quick,celery", "--hostname=worker-quick@%h", "--concurrency=1", "-B"]
    networks: *internal-network
    ports:
      - "8101:8101" # for prometheus metrics scraping; need to have unique port per worker to build compose stack, but can then scrape based on the service name and port 8001
  worker-long:
    hostname: worker-long
    build: *worker-build
    healthcheck: *worker-healthcheck
    depends_on: *worker-api-depends
    environment: *worker-env
    develop: *watch-celery-src
    command: ["-Q", "long", "--hostname=worker-long@%h", "--concurrency=1"]
    networks: *internal-network
    ports:
      - "8102:8101" # for prometheus metrics scraping; need to have unique port per worker to build compose stack, but can then scrape based on the service name and port 8001
  minio:
    image: bitnamilegacy/minio:2025.7.23-debian-12-r5
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: badpassword
    command: server --console-address ":9001" /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 5
    user: "0:0" #for local dev only! To avoid volume permission issues with Docker on macOS
    volumes:
      - minio-data:/data
      - minio-bitnami-data:/bitnami/minio/data #to avoid anonymous volumes being created
      - minio-certs:/certs #to avoid anonymous volumes being created
    networks: &s3-network
      - external-s3
  minio-setup: # Create the 2 service accounts 
    # 1 for api + worker and 1 for cronjob for hard deletion of expired objects 
    image: bitnamilegacy/minio-client:2025.7.21-debian-12-r3
    depends_on:
      minio:
        condition: service_healthy
    restart: on-failure
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=badpassword
    volumes:
      - ./s3_service_account_policy.json:/tmp/api-worker-policy.json:ro
      - ./s3_cron_service_account_policy.json:/tmp/cronjob-policy.json:ro
    networks: *s3-network
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin badpassword;
      mc admin policy create minio divbase-api-policy /tmp/api-worker-policy.json;
      mc admin user add minio s3-service-account badpassword;
      mc admin policy attach minio divbase-api-policy --user s3-service-account;

      mc admin policy create minio divbase-cron-policy /tmp/cronjob-policy.json;
      mc admin user add minio s3-cron-service-account badpassword;
      mc admin policy attach minio divbase-cron-policy --user s3-cron-service-account;
      "
  db-migrator: # init container that runs any pending alembic migrations on startup
    build:
      context: ..
      dockerfile: docker/fastapi.dockerfile
    environment:
      - SYNC_DATABASE_URL=postgresql+psycopg2://divbase_user:badpassword@postgres:5432/divbase_db
    command: ["alembic", "upgrade", "head"]
    depends_on: 
      postgres:
        condition: service_healthy
    networks: *internal-network
    volumes: # read only volumes to get any new migration files (otherwise have to rebuild image to get new migration scripts)
      - ../packages/divbase-api/src/divbase_api/migrations:/app/migrations:ro
      - ../packages/divbase-api/src/divbase_api/alembic.ini:/app/alembic.ini:ro
  fastapi:
    build:
      context: ..
      dockerfile: docker/fastapi.dockerfile
    ports:
      - 8000:8000
    command: ["fastapi", "dev", "--host", "0.0.0.0", "/app/.venv/lib/python3.13/site-packages/divbase_api/divbase_api.py"] 
    develop: # rebuild only on changes to deps. 
      watch:
        - action: sync+restart
          path: ../packages/divbase-api/src/divbase_api/
          target: /app/.venv/lib/python3.13/site-packages/divbase_api/
        - action: sync+restart
          path: ../packages/divbase-lib/src/divbase_lib/
          target: /app/.venv/lib/python3.13/site-packages/divbase_lib/
        - action: rebuild
          path: ../uv.lock
    volumes:
      - ../packages/divbase-api/src/divbase_api/migrations:/app/migrations # this is to get the migration scripts which are generated inside the container 
      - ../packages/divbase-api/src/divbase_api/alembic.ini:/app/alembic.ini
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/core/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
    - DIVBASE_ENV=local_dev
    - FRONTEND_BASE_URL=http://localhost:8000
    - MKDOCS_SITE_URL=http://localhost:8008/divbase 
    - USER_SUPPORT_EMAIL=dsn-eb@scilifelab.se
    - CELERY_BROKER_URL=pyamqp://celery_user:badpassword@rabbitmq:5672//
    - CELERY_RESULT_BACKEND=db+postgresql://divbase_user:badpassword@postgres:5432/divbase_db
    - ASYNC_DATABASE_URL=postgresql+asyncpg://divbase_user:badpassword@postgres:5432/divbase_db 
    - SYNC_DATABASE_URL=postgresql+psycopg2://divbase_user:badpassword@postgres:5432/divbase_db # Needed for lifespan event to check migrations are at HEAD.
    - JWT_SECRET_KEY=a-string-secret-at-least-256-bits-long
    - FIRST_ADMIN_EMAIL=admin@divbase.com
    - FIRST_ADMIN_PASSWORD=badpassword
    - S3_ENDPOINT_URL=http://host.docker.internal:9000
    - S3_PRESIGNING_URL=http://localhost:9000
    - S3_BUCKET_PREFIX=divbase-local-
    - S3_SERVICE_ACCOUNT_ACCESS_KEY=s3-service-account
    - S3_SERVICE_ACCOUNT_SECRET_KEY=badpassword
    depends_on: *worker-api-depends
    networks: *internal-network
  # in k8s this is run as a separate cronjob in diff namespace, here we just run it on compose up
  cleanup-files-cron:
    build:
      context: ..
      dockerfile: docker/fastapi.dockerfile
    command: ["python", "-m", "divbase_api.scripts.cleanup_expired_files"]
    restart: "no" 
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      db-migrator:
        condition: service_completed_successfully
    environment:
      - DIVBASE_ENV=local_dev
      - SYNC_DATABASE_URL=postgresql+psycopg2://divbase_user:badpassword@postgres:5432/divbase_db
      - S3_ENDPOINT_URL=http://host.docker.internal:9000
      - S3_CRON_SERVICE_ACCOUNT_ACCESS_KEY=s3-cron-service-account
      - S3_CRON_SERVICE_ACCOUNT_SECRET_KEY=badpassword
    networks:
      - internal
  postgres:
    image: "postgres:17.9-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609"
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U divbase_user -d divbase_db"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=divbase_user
      - POSTGRES_DB=divbase_db
      - POSTGRES_PASSWORD=badpassword
    networks: *internal-network
  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI 
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - mailpit-data:/data
    networks: *internal-network
volumes:
  rabbitmq-data:
  minio-data:
  minio-bitnami-data:
  minio-certs:
  postgres-data:
  mailpit-data: