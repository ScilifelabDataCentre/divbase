[tool.uv.workspace]
members = [
    "packages/divbase-cli",
    "packages/divbase-lib",
    "packages/divbase-api",
]

# For pytest e2e coverage.py runs: setup to allow 'coverage combine' to work
[tool.coverage.run]
source_pkgs = ["divbase_lib", "divbase_cli", "divbase_api"]
branch = true
relative_files = true

# For pytest e2e coverage.py runs: report formatting configuration
[tool.coverage.report]
show_missing = true
skip_empty = true
omit = [
    "*/migrations/*",
    "*/static/*",
    "*/templates/*",
]

# For pytest e2e coverage.py runs: remap container site-packages paths to host source tree so `coverage combine` can merge Docker .coverage.* files with the host-generated .coverage file.
[tool.coverage.paths]
divbase_api = [
    "packages/divbase-api/src/divbase_api",
    "/app/.venv/lib/python3.13/site-packages/divbase_api",
]
divbase_lib = [
    "packages/divbase-lib/src/divbase_lib",
    "/app/.venv/lib/python3.13/site-packages/divbase_lib",
]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "pytest-cov>=6.0.0",
    "pre-commit>=3.7.0",
    "pytest-env>=1.1.5",
    "pytest-playwright>=0.7.2",
    "pytest-alembic>=0.12.1",
    "pytest-mock-resources[docker]>=2.12.4",
    "mkdocs>=1.6.1,<2.0", # 2.0.0 will break mkdocs-material
    "pymdown-extensions>=10.19.1",
    "mkdocs-material[imaging]>=9.7.0",
    "virtualenv>=20.36.1", # state explictly to bump version for security reasons
]
benchmarking = [
    "scipy>=1.16.0",
    "matplotlib>=3.10",
    "seaborn>=0.13",
    "statsmodels>=0.14.4",
    "requests>=2.32.4",
]